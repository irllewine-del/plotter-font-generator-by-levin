<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Segoe Script Stroke — плоттер</title>
<style>
  :root {
    --bg: #0c0e14;
    --bg-grid: #131722;
    --surface: #161a24;
    --surface-2: #1c212e;
    --border: #262c3a;
    --border-soft: #1f2532;
    --text: #e8e6df;
    --text-dim: #b4b6bf;
    --muted: #6b7081;
    --muted-2: #4a4f5d;
    --accent: #d4a373;
    --accent-dim: #8a6a4a;
    --paper: #fcfaf6;
    --paper-shadow: rgba(0, 0, 0, 0.45);
    --ink: #1a1410;
    --margin-line: rgba(140, 110, 80, 0.4);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, var(--bg-grid) 1px, transparent 0);
    background-size: 24px 24px;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  header {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(12, 14, 20, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  header .logo-mark {
    width: 26px; height: 26px;
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 14px;
    color: var(--accent);
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    letter-spacing: -0.04em;
  }

  header h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header .sub {
    color: var(--muted);
    font-size: 12px;
    border-left: 1px solid var(--border);
    padding-left: 14px;
    margin-left: 4px;
  }

  header .right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
    min-height: 0;
  }

  /* Controls panel */
  aside.controls {
    overflow-y: auto;
    border-right: 1px solid var(--border-soft);
    background: var(--surface);
    padding: 18px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  aside.controls::-webkit-scrollbar { width: 8px; }
  aside.controls::-webkit-scrollbar-track { background: transparent; }
  aside.controls::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  section.group {
    border-top: 1px solid var(--border-soft);
    padding: 14px 0 4px;
  }
  section.group:first-of-type {
    border-top: 0;
    padding-top: 4px;
  }

  section.group h3 {
    margin: 0 0 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.group h3::before {
    content: "";
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    color: var(--text-dim);
    font-size: 12px;
  }
  .row.full {
    grid-template-columns: 1fr;
  }

  .row label.lbl { color: var(--text-dim); }

  .field {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 5px;
    font: inherit;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    font-size: 12px;
    width: 70px;
    text-align: right;
    -moz-appearance: textfield;
  }
  .input::-webkit-outer-spin-button,
  .input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .input:focus {
    outline: none;
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.12);
  }
  .input.wide { width: 100%; text-align: left; }

  .unit {
    color: var(--muted);
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    font-size: 11px;
    min-width: 22px;
  }

  select.input {
    text-align: left;
    width: auto;
    padding-right: 24px;
    background: var(--bg) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236b7081' stroke-width='1.4'/></svg>") no-repeat right 8px center;
    appearance: none;
  }

  textarea.input {
    width: 100%;
    text-align: left;
    min-height: 110px;
    resize: vertical;
    line-height: 1.55;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .presets button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 9px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    transition: all 0.15s;
  }
  .presets button:hover {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  .seg {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .seg button {
    flex: 1;
    background: transparent;
    border: 0;
    border-left: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    cursor: pointer;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  .seg button:first-child { border-left: 0; }
  .seg button:hover { color: var(--text); }
  .seg button.active {
    background: var(--accent);
    color: #1a1410;
    font-weight: 600;
  }

  button.primary {
    margin-top: 18px;
    width: 100%;
    background: var(--accent);
    color: #1a1410;
    border: 0;
    padding: 10px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 0.01em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button.primary:hover { background: #e0b283; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212, 163, 115, 0.2);}
  button.primary:active { transform: translateY(0); }

  .stats {
    margin-top: 14px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--muted);
    display: grid;
    gap: 4px;
  }
  .stats .row-stat {
    display: flex;
    justify-content: space-between;
  }
  .stats .row-stat span:last-child {
    color: var(--text-dim);
  }

  /* Preview */
  main.preview {
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
  }
  main.preview::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 10px 10px, 10px 10px;
    pointer-events: none;
  }
  main.preview::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, var(--bg) 100%);
    pointer-events: none;
  }

  .paper-wrap {
    position: relative;
    background: var(--paper);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 6px 28px var(--paper-shadow),
      0 24px 60px rgba(0, 0, 0, 0.35);
    transition: width 0.25s cubic-bezier(0.2, 0.7, 0.2, 1), height 0.25s cubic-bezier(0.2, 0.7, 0.2, 1);
    z-index: 1;
  }

  .paper-wrap svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .dim-label {
    position: absolute;
    color: var(--muted);
    font-size: 10px;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .dim-label.top  { top: -22px; left: 50%; transform: translateX(-50%); }
  .dim-label.left { left: -10px; top: 50%; transform: translate(-100%, -50%); }

  /* Color swatch */
  input[type="color"] {
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    width: 28px; height: 22px;
    padding: 0;
    cursor: pointer;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type="color"]::-webkit-color-swatch { border: 0; border-radius: 2px; }
  input[type="color"]::-moz-color-swatch { border: 0; border-radius: 2px; }

  .toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { accent-color: var(--accent); }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside.controls { border-right: 0; border-bottom: 1px solid var(--border-soft); max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">/</div>
  <h1>Segoe Script Stroke</h1>
  <span class="sub">single-stroke рендер для плоттера</span>
  <div class="right">
    <span id="codepoints">607 глифов</span>
  </div>
</header>

<div class="layout">
  <aside class="controls">

    <section class="group">
      <h3>Лист</h3>
      <div class="row">
        <span class="lbl">Ширина</span>
        <div class="field"><input class="input" type="number" id="pageW" value="210" min="10" step="1"><span class="unit">мм</span></div>
      </div>
      <div class="row">
        <span class="lbl">Высота</span>
        <div class="field"><input class="input" type="number" id="pageH" value="297" min="10" step="1"><span class="unit">мм</span></div>
      </div>
      <div class="row">
        <span class="lbl">Поля</span>
        <div class="field"><input class="input" type="number" id="margin" value="20" min="0" step="1"><span class="unit">мм</span></div>
      </div>
      <div class="presets">
        <button data-w="210" data-h="297">A4</button>
        <button data-w="297" data-h="210">A4 ↻</button>
        <button data-w="148" data-h="210">A5</button>
        <button data-w="297" data-h="420">A3</button>
        <button data-w="216" data-h="279">Letter</button>
        <button data-w="100" data-h="148">A6</button>
        <button data-w="100" data-h="150">10×15</button>
      </div>
    </section>

    <section class="group">
      <h3>Текст</h3>
      <div class="row">
        <span class="lbl">Размер</span>
        <div class="field"><input class="input" type="number" id="fontSize" value="10" min="1" step="0.5"><span class="unit">мм</span></div>
      </div>
      <div class="row">
        <span class="lbl">Межстрочный</span>
        <div class="field"><input class="input" type="number" id="lineHeight" value="1.15" min="0.6" step="0.05"><span class="unit">×</span></div>
      </div>
      <div class="row">
        <span class="lbl">Выравнивание</span>
        <div class="seg" id="alignSeg" data-value="left">
          <button data-v="left">влево</button>
          <button data-v="center">центр</button>
          <button data-v="right">вправо</button>
        </div>
      </div>
      <div class="row">
        <span class="lbl">Перенос строк</span>
        <label class="toggle" style="justify-self: end;">
          <input type="checkbox" id="wrap" checked>
          <span>авто</span>
        </label>
      </div>
    </section>

    <section class="group">
      <h3>Перо</h3>
      <div class="row">
        <span class="lbl">Толщина</span>
        <div class="field"><input class="input" type="number" id="strokeWidth" value="0.4" min="0.05" step="0.05"><span class="unit">мм</span></div>
      </div>
      <div class="row">
        <span class="lbl">Цвет</span>
        <input type="color" id="strokeColor" value="#1a1410" style="justify-self: end;">
      </div>
      <div class="row">
        <span class="lbl">Сглаживание</span>
        <label class="toggle" style="justify-self: end;">
          <input type="checkbox" id="smooth" checked>
          <span>кривые</span>
        </label>
      </div>
    </section>

    <section class="group">
      <h3>Содержимое</h3>
      <div class="row full">
        <textarea class="input wide" id="text" spellcheck="false">Привет, плоттер!
The quick brown fox jumps
over the lazy dog. 0123456789</textarea>
      </div>
    </section>

    <button class="primary" id="download">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v10m0 0L4 7m4 4l4-4M2 13v2h12v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Скачать SVG
    </button>

    <div class="stats" id="stats">
      <div class="row-stat"><span>полилиний</span><span id="statPolys">—</span></div>
      <div class="row-stat"><span>точек</span><span id="statPts">—</span></div>
      <div class="row-stat"><span>длина пера</span><span id="statLen">—</span></div>
      <div class="row-stat"><span>строк</span><span id="statLines">—</span></div>
    </div>

  </aside>

  <main class="preview">
    <div class="paper-wrap" id="paper">
      <span class="dim-label top" id="dimTop">210 мм</span>
      <span class="dim-label left" id="dimLeft">297 мм</span>
      <svg id="svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </main>
</div>

<script>
(() => {
  "use strict";

  const FONT = JSON.parse(document.getElementById("fontdata").textContent);
  const UPEM = FONT.meta.unitsPerEm;
  const ASC  = FONT.meta.ascent;
  const DESC = FONT.meta.descent;

  const $ = id => document.getElementById(id);

  // Codepoint count display
  $("codepoints").textContent = Object.keys(FONT.glyphs).length + " глифов";

  // Build a fast char -> glyph map (Unicode codepoint -> glyph object)
  const GLYPHS = new Map();
  for (const [k, g] of Object.entries(FONT.glyphs)) {
    GLYPHS.set(parseInt(k.slice(2), 16), g);
  }

  function glyphFor(ch) {
    const cp = ch.codePointAt(0);
    return GLYPHS.get(cp);
  }

  // ----------- Layout -----------
  function measureWord(word, scale) {
    let w = 0;
    for (const ch of word) {
      const g = glyphFor(ch);
      w += (g ? g.advance : UPEM * 0.4);
    }
    return w * scale;
  }

  function wrapLine(text, scale, maxWidth, doWrap) {
    if (!doWrap) return [text];
    // Split keeping spaces as their own tokens
    const tokens = text.split(/(\s+)/).filter(t => t.length > 0);
    const lines = [];
    let cur = "";
    let curW = 0;
    for (const t of tokens) {
      const tw = measureWord(t, scale);
      if (cur === "") {
        cur = t;
        curW = tw;
        continue;
      }
      if (curW + tw <= maxWidth) {
        cur += t;
        curW += tw;
      } else {
        lines.push(cur);
        // Skip leading whitespace token on the new line
        if (/^\s+$/.test(t)) {
          cur = "";
          curW = 0;
        } else {
          cur = t;
          curW = tw;
        }
      }
    }
    if (cur !== "") lines.push(cur);
    return lines;
  }

  // Catmull-Rom spline through the existing points, replacing straight
  // segments with a smooth curve without moving any of the original points.
  function smoothPolyline(pts) {
    const n = pts.length;
    if (n < 3) return pts;
    const out = [pts[0]];
    for (let i = 0; i < n - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || pts[i + 1];
      const segLen = Math.hypot(p2[0] - p1[0], p2[1] - p1[1]);
      const steps = Math.max(2, Math.min(12, Math.round(segLen / 0.4)));
      for (let s = 1; s <= steps; s++) {
        const t = s / steps, t2 = t * t, t3 = t2 * t;
        const x = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t
                + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2
                + (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3);
        const y = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t
                + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2
                + (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3);
        out.push([x, y]);
      }
    }
    return out;
  }

  function lineWidth(line, scale) {
    let w = 0;
    for (const ch of line) {
      const g = glyphFor(ch);
      w += (g ? g.advance : UPEM * 0.4);
    }
    return w * scale;
  }

  function layoutText(opts) {
    const { text, pageW, pageH, margin, fontSize, lineHeight, align, wrap, smooth } = opts;
    const scale = fontSize / UPEM;
    const printableW = Math.max(1, pageW - 2 * margin);
    const printableH = Math.max(1, pageH - 2 * margin);

    // Use natural line height (asc-desc) so descenders and ascenders don't collide
    const naturalLH = (ASC - DESC) * scale;
    const lineH = naturalLH * lineHeight;

    // Wrap each paragraph
    const lines = [];
    for (const para of text.split("\n")) {
      const wrapped = wrapLine(para, scale, printableW, wrap);
      for (const ln of wrapped) lines.push(ln);
    }

    // Render lines that fit within the printable area
    const polylines = [];
    // First baseline: top of printable area + ascent (so the tallest letter sits at the top)
    let yBase = margin + ASC * scale;
    let linesDrawn = 0;
    let linesOverflow = 0;

    for (const line of lines) {
      // If this line's descent goes below the printable area, stop.
      if (yBase - DESC * scale > margin + printableH + 0.001) {
        linesOverflow = lines.length - linesDrawn;
        break;
      }

      const lw = lineWidth(line, scale);
      let x;
      if (align === "center")      x = margin + (printableW - lw) / 2;
      else if (align === "right")  x = pageW - margin - lw;
      else                         x = margin;

      for (const ch of line) {
        const g = glyphFor(ch);
        if (g) {
          for (const stroke of g.strokes) {
            const pts = new Array(stroke.length);
            for (let i = 0; i < stroke.length; i++) {
              pts[i] = [x + stroke[i][0] * scale, yBase - stroke[i][1] * scale];
            }
            polylines.push(smooth ? smoothPolyline(pts) : pts);
          }
          x += g.advance * scale;
        } else {
          x += UPEM * 0.4 * scale;
        }
      }

      yBase += lineH;
      linesDrawn++;
    }

    return { polylines, linesDrawn, linesOverflow, totalLines: lines.length };
  }

  // ----------- Build SVG -----------
  function pointsAttr(pl) {
    let s = "";
    for (let i = 0; i < pl.length; i++) {
      if (i > 0) s += " ";
      s += pl[i][0].toFixed(2) + "," + pl[i][1].toFixed(2);
    }
    return s;
  }

  function buildPreview(polylines, opts) {
    const { pageW, pageH, margin, strokeWidth, strokeColor } = opts;
    let body = "";
    if (margin > 0) {
      body += `<rect x="${margin}" y="${margin}" `
            + `width="${pageW - 2*margin}" height="${pageH - 2*margin}" `
            + `fill="none" stroke="rgba(140,110,80,.35)" `
            + `stroke-width="${(Math.min(pageW,pageH) * 0.0015).toFixed(3)}" `
            + `stroke-dasharray="${(pageW*0.01).toFixed(2)} ${(pageW*0.012).toFixed(2)}"/>`;
    }
    body += `<g fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" `
          + `stroke-linecap="round" stroke-linejoin="round">`;
    for (const pl of polylines) body += `<polyline points="${pointsAttr(pl)}"/>`;
    body += "</g>";
    return body;
  }

  function buildDownloadSVG(polylines, opts) {
    const { pageW, pageH, strokeWidth, strokeColor } = opts;
    let body = "";
    body += `<g fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" `
          + `stroke-linecap="round" stroke-linejoin="round">\n`;
    for (const pl of polylines) body += `  <polyline points="${pointsAttr(pl)}"/>\n`;
    body += "</g>";
    return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" `
+ `viewBox="0 0 ${pageW} ${pageH}" `
+ `width="${pageW}mm" height="${pageH}mm">\n${body}\n</svg>\n`;
  }

  function totalPenLength(polylines) {
    let total = 0;
    for (const pl of polylines) {
      for (let i = 1; i < pl.length; i++) {
        const dx = pl[i][0] - pl[i-1][0];
        const dy = pl[i][1] - pl[i-1][1];
        total += Math.sqrt(dx*dx + dy*dy);
      }
    }
    return total;
  }

  // ----------- State -----------
  const state = {
    align: "left"
  };

  function getOpts() {
    return {
      pageW: Math.max(10, +$("pageW").value || 210),
      pageH: Math.max(10, +$("pageH").value || 297),
      margin: Math.max(0, +$("margin").value || 0),
      fontSize: Math.max(0.5, +$("fontSize").value || 10),
      lineHeight: Math.max(0.6, +$("lineHeight").value || 1.15),
      strokeWidth: Math.max(0.05, +$("strokeWidth").value || 0.3),
      strokeColor: $("strokeColor").value || "#1a1410",
      align: state.align,
      wrap: $("wrap").checked,
      smooth: $("smooth").checked,
      text: $("text").value
    };
  }

  // ----------- Preview sizing -----------
  function fitPaper() {
    const opts = getOpts();
    const main = document.querySelector("main.preview");
    const wrap = $("paper");
    const aspect = opts.pageW / opts.pageH;
    const availW = main.clientWidth - 80;
    const availH = main.clientHeight - 80;
    let w, h;
    if (availW / aspect <= availH) {
      w = availW; h = w / aspect;
    } else {
      h = availH; w = h * aspect;
    }
    wrap.style.width  = w.toFixed(1) + "px";
    wrap.style.height = h.toFixed(1) + "px";
    $("dimTop").textContent  = opts.pageW + " мм";
    $("dimLeft").textContent = opts.pageH + " мм";
  }

  // ----------- Render -----------
  let scheduled = false;
  function scheduleRender() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => {
      scheduled = false;
      render();
    });
  }

  function render() {
    const opts = getOpts();
    fitPaper();

    const { polylines, linesDrawn, linesOverflow, totalLines } = layoutText(opts);

    const svg = $("svg");
    svg.setAttribute("viewBox", `0 0 ${opts.pageW} ${opts.pageH}`);
    svg.innerHTML = buildPreview(polylines, opts);

    // Stats
    const totalPts = polylines.reduce((a, p) => a + p.length, 0);
    const totalLen = totalPenLength(polylines);
    $("statPolys").textContent = polylines.length.toLocaleString("ru-RU");
    $("statPts").textContent = totalPts.toLocaleString("ru-RU");
    $("statLen").textContent = totalLen.toFixed(0) + " мм";
    let linesText = linesDrawn + " / " + totalLines;
    if (linesOverflow > 0) linesText += "  ⚠ обрезано";
    $("statLines").textContent = linesText;
  }

  // ----------- Wire up -----------
  ["pageW","pageH","margin","fontSize","lineHeight","strokeWidth","strokeColor","wrap","smooth","text"]
    .forEach(id => $(id).addEventListener("input", scheduleRender));

  // Presets
  document.querySelectorAll(".presets button").forEach(b => {
    b.addEventListener("click", () => {
      $("pageW").value = b.dataset.w;
      $("pageH").value = b.dataset.h;
      scheduleRender();
    });
  });

  // Alignment segmented control
  const seg = $("alignSeg");
  function setAlign(v) {
    state.align = v;
    seg.dataset.value = v;
    seg.querySelectorAll("button").forEach(b => {
      b.classList.toggle("active", b.dataset.v === v);
    });
    scheduleRender();
  }
  seg.querySelectorAll("button").forEach(b => {
    b.addEventListener("click", () => setAlign(b.dataset.v));
  });
  setAlign("left");

  // Window resize
  window.addEventListener("resize", scheduleRender);

  // Download
  $("download").addEventListener("click", () => {
    const opts = getOpts();
    const { polylines } = layoutText(opts);
    const svgText = buildDownloadSVG(polylines, opts);
    const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `plot-${opts.pageW}x${opts.pageH}mm.svg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 200);
  });

  // Initial render
  render();
})();
</script>
</body>
</html>
